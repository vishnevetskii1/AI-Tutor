services:
  ollama:
    image: ollama/ollama:latest
    volumes:
      - ollama_data:/root/.ollama
    restart: unless-stopped

  ollama-init:
    image: ollama/ollama:latest
    depends_on:
      ollama:
        condition: service_started
    environment:
      - OLLAMA_HOST=http://ollama:11434
      - OLLAMA_MODEL=${OLLAMA_MODEL:-qwen2.5:3b}
    entrypoint:
      - /bin/sh
      - -lc
      - |
        until ollama list >/dev/null 2>&1; do
          sleep 2
        done
        ollama pull "$OLLAMA_MODEL"
    restart: "no"

  qdrant:
    image: qdrant/qdrant:latest
    ports:
      - "127.0.0.1:6333:6333"
    volumes:
      - qdrant_data:/qdrant/storage

  bot:
    build: .
    env_file: .env
    environment:
      - OLLAMA_URL=http://ollama:11434
      - QDRANT_URL=http://qdrant:6333
      - SQLITE_PATH=/app/data/db/tutor.db
      - DISCIPLINES_DIR=/app/data/disciplines
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - bot_data:/app/data/db
      - ./data/disciplines:/app/data/disciplines
    depends_on:
      ollama:
        condition: service_started
      ollama-init:
        condition: service_completed_successfully
      qdrant:
        condition: service_started
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  ollama_data:
  qdrant_data:
  bot_data:
